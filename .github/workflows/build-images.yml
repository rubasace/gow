name: Build images

# Builds every image under images/* in parallel and publishes it to the GitHub
# Container Registry (GHCR). Each image is tagged with `edge` (rolling, latest
# build of the default branch) and — when the Dockerfile pins an upstream
# version via a `# renovate:`-annotated `ARG <APP>_VERSION=` — with that exact
# version too (e.g. soh:9.2.3). Images are signed keyless with
# cosign (Sigstore / GitHub OIDC). No Docker Hub involved.
#
# Adding a new image is zero-config: drop a folder under images/<name>/ with a
# Dockerfile. .github/scripts/build-matrix.sh discovers it automatically.

on:
  push:
    branches: [main]
    paths:
      - 'images/**'
      - '.github/workflows/build-images.yml'
      - '.github/scripts/**'
  # Manual "rebuild now" trigger (Actions tab, `gh workflow run`, or the API).
  # Ignores the push diff/paths: it builds exactly what you ask for, whether or
  # not anything changed — handy to re-publish after a failed run or to pick up a
  # new base-app without a version bump.
  workflow_dispatch:
    inputs:
      images:
        description: 'Images to build, comma-separated (blank = all)'
        required: false
        default: ''

# Don't publish two overlapping runs for the same ref; let an in-flight publish
# finish rather than cancelling it half-pushed.
concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: false

permissions:
  contents: read

jobs:
  discover:
    name: Discover images
    runs-on: ubuntu-latest
    outputs:
      matrix: ${{ steps.set.outputs.matrix }}
      count: ${{ steps.set.outputs.count }}
    steps:
      - uses: actions/checkout@v4
        with:
          # Full history so build-matrix.sh can diff the pushed range and build
          # only the images that actually changed.
          fetch-depth: 0
      - id: set
        name: Compute build matrix
        env:
          GITHUB_EVENT_NAME: ${{ github.event_name }}
          BEFORE_SHA: ${{ github.event.before }}
          GITHUB_SHA: ${{ github.sha }}
          IMAGES_INPUT: ${{ github.event.inputs.images }}
        run: bash .github/scripts/build-matrix.sh

  build:
    name: ${{ matrix.name }}
    needs: discover
    if: needs.discover.outputs.count != '0'
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix: ${{ fromJson(needs.discover.outputs.matrix) }}
    permissions:
      contents: read
      packages: write   # push to GHCR
      id-token: write   # cosign keyless signing via GitHub OIDC
    steps:
      - uses: actions/checkout@v4

      - name: Resolve image reference
        env:
          OWNER: ${{ github.repository_owner }}
        run: echo "IMAGE=ghcr.io/${OWNER,,}/${{ matrix.name }}" >> "$GITHUB_ENV"

      - name: Log in to GHCR
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Set up Buildx
        uses: docker/setup-buildx-action@v3

      - name: Docker metadata (tags + labels)
        id: meta
        uses: docker/metadata-action@v5
        with:
          images: ${{ env.IMAGE }}
          tags: |
            type=raw,value=edge,enable={{is_default_branch}}
            type=raw,value=${{ matrix.version }},enable=${{ matrix.version != '' }}

      - name: Build and push
        id: build
        uses: docker/build-push-action@v6
        with:
          context: ${{ matrix.context }}
          file: ${{ matrix.context }}/Dockerfile
          push: ${{ github.event_name != 'pull_request' }}
          tags: ${{ steps.meta.outputs.tags }}
          labels: ${{ steps.meta.outputs.labels }}
          annotations: ${{ steps.meta.outputs.annotations }}
          provenance: false
          cache-from: type=gha,scope=${{ matrix.name }}
          cache-to: type=gha,mode=max,scope=${{ matrix.name }}

      - name: Install cosign
        if: github.event_name != 'pull_request'
        uses: sigstore/cosign-installer@v3

      - name: Sign image (keyless)
        if: github.event_name != 'pull_request'
        env:
          DIGEST: ${{ steps.build.outputs.digest }}
        run: cosign sign --yes "${IMAGE}@${DIGEST}"

      - name: Job summary
        if: github.event_name != 'pull_request'
        env:
          TAGS: ${{ steps.meta.outputs.tags }}
          DIGEST: ${{ steps.build.outputs.digest }}
        run: |
          {
            echo "### ${{ matrix.name }}"
            echo ""
            echo "**Digest:** \`${DIGEST}\` (signed with cosign)"
            echo ""
            echo "**Tags:**"
            echo '```'
            echo "${TAGS}"
            echo '```'
          } >> "$GITHUB_STEP_SUMMARY"
