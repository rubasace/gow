[[profiles.apps]]
icon_png_path = 'https://mario.wiki.gallery/images/thumb/6/63/SM64_Boxart.png/250px-SM64_Boxart.png'
start_virtual_compositor = true
title = 'Ghostship (Super Mario 64)'

[profiles.apps.runner]
base_create_json = '''{
  "HostConfig": {
    "IpcMode": "host",
    "CapAdd": ["SYS_NICE", "NET_RAW", "MKNOD", "NET_ADMIN"],
    "Privileged": false,
    "DeviceCgroupRules": ["c 13:* rmw", "c 244:* rmw"]
  }
}
'''
devices = []
env = [ 'RUN_SWAY=true', 'GOW_REQUIRED_DEVICES=/dev/input/* /dev/dri/* /dev/nvidia*' ]
image = 'ghcr.io/rubasace/ghostship:edge'
mounts = ["/roms:/roms:rw"]
name = 'WolfGhostship'
ports = []
type = 'docker'
