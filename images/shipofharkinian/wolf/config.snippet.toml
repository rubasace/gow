# Paste this block into Wolf's config.toml (usually /etc/wolf/cfg/config.toml,
# mounted into the Wolf container) and restart Wolf. It shows up in Moonlight.
#
# The "soh:wolf" image must exist LOCALLY on the host running Wolf
# (Wolf launches containers via the host's docker.sock) -> build it there.

[[apps]]
title = "Ship of Harkinian"
start_virtual_compositor = true

[apps.runner]
type = "docker"
name = "WolfSoH"
image = "soh:wolf"
# Settings + saves are PER-USER: Wolf already bind-mounts a per-profile home at
# /home/retro automatically, so we don't mount anything for those.
#
# The only mount we add is the SHARED data folder you manage on the host: drop your
# ROM (.z64) there and, optionally, a pre-generated common oot.o2r. If there's no
# oot.o2r yet, SoH generates one and the launcher promotes it back here (needs the
# host folder writable by uid 1000: `sudo chown 1000:1000 /mnt/wolf/shared/shipofharkinian`).
# If you'll always provide the oot.o2r yourself, you can make this mount read-only (:ro).
mounts = ["/mnt/wolf/shared/shipofharkinian:/mnt/soh-shared:rw"]
env = [
  "RUN_SWAY=1",
  "GOW_REQUIRED_DEVICES=/dev/input/* /dev/dri/* /dev/nvidia* /dev/uinput",
  # NVIDIA: also add /dev/nvidia* to the line above.
  # Cleaner fullscreen: swap RUN_SWAY=1 for RUN_GAMESCOPE=1.
]
devices = []
ports = []
base_create_json = """
{
  "HostConfig": {
    "IpcMode": "host",
    "Privileged": false,
    "CapAdd": ["NET_RAW", "MKNOD", "NET_ADMIN", "SYS_NICE"],
    "DeviceCgroupRules": ["c 13:* rmw"]
  }
}
"""
