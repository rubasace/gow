[[profiles.apps]]
icon_png_path = 'https://static.wikia.nocookie.net/zelda_gamepedia_en/images/4/48/OoT_NA_Box.jpg'
start_virtual_compositor = true
title = '2 Ship 2 Harkinian'

[profiles.apps.runner]
base_create_json = '''{
  "HostConfig": {
    "IpcMode": "host",
    "CapAdd": ["SYS_NICE", "NET_RAW", "MKNOD", "NET_ADMIN"],
    "Privileged": false,
    "DeviceCgroupRules": ["c 13:* rmw", "c 244:* rmw"]
  }
}
'''
devices = []
env = [ 'RUN_SWAY=true', 'GOW_REQUIRED_DEVICES=/dev/input/* /dev/dri/* /dev/nvidia*' ]
image = 'ghcr.io/rubasace/2s2h:edge'
mounts = ["/roms:/roms:rw"]
name = 'Wolf2S2H'
ports = []
type = 'docker'